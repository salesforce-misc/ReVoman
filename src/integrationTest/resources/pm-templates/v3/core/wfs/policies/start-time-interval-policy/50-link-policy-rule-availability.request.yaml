$kind: http-request
url: "{{baseUrl}}{{versionPath}}/tooling/sobjects/SchedulingPolicyRule"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "SchedulingPolicyId": "{{startTimeIntervalPolicyId}}",
      "SchedulingRuleId": "{{startTimeIntervalAvailabilityRuleId}}",
      "IsActive": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.environment.set("startTimeIntervalPolicyRuleAvailabilityId", pm.response.json().id);
    language: text/javascript
order: 50000

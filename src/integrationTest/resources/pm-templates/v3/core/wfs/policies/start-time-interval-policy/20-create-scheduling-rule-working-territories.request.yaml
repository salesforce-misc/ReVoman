$kind: http-request
url: "{{baseUrl}}{{versionPath}}/sobjects/SchedulingRule"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "MasterLabel": "STI WorkingTerritories",
      "DeveloperName": "STI_WorkingTerritories_{{$timestamp}}",
      "SchedulingRuleType": "WorkingTerritories",
      "SchedulingCategory": "A"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.environment.set("startTimeIntervalWorkingTerritoriesRuleId", pm.response.json().id);
    language: text/javascript
order: 20000

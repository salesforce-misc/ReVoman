$kind: http-request
url: "{{baseUrl}}{{versionPath}}/sobjects/SchedulingRule"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "MasterLabel": "Availability STM-OH Test",
      "DeveloperName": "Availability_StmOh_Test_{{$timestamp}}",
      "SchedulingRuleType": "C",
      "SchedulingCategory": "A"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.environment.set("availabilityOpHoursRuleId", pm.response.json().id);
    language: text/javascript
order: 10000

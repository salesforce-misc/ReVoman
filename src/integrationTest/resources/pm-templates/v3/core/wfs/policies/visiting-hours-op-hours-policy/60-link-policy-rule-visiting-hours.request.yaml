$kind: http-request
description: Links the ServiceAppointmentVisitingHours rule to the policy.
url: "{{baseUrl}}{{versionPath}}/tooling/sobjects/SchedulingPolicyRule"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "SchedulingPolicyId": "{{visitingHoursPolicyId}}",
      "SchedulingRuleId": "{{visitingHoursRuleId}}",
      "IsActive": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.environment.set("visitingHoursPolicyRuleId", pm.response.json().id);
    language: text/javascript
order: 60000

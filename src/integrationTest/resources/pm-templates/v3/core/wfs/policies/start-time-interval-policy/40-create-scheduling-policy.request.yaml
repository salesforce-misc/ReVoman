$kind: http-request
url: "{{baseUrl}}{{versionPath}}/tooling/sobjects/SchedulingPolicy"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "MasterLabel": "STI Policy",
      "DeveloperName": "STI_Policy_{{$timestamp}}",
      "SchedulingCategory": "A"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.environment.set("startTimeIntervalPolicyId", pm.response.json().id);
    language: text/javascript
order: 40000

$kind: http-request
url: "{{baseUrl}}{{versionPath}}/tooling/sobjects/SchedulingPolicy"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "MasterLabel": "Availability STM-OH Policy",
      "DeveloperName": "Availability_StmOh_Policy_{{$timestamp}}",
      "SchedulingCategory": "A"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.environment.set("availabilityOpHoursPolicyId", pm.response.json().id);
    language: text/javascript
order: 30000

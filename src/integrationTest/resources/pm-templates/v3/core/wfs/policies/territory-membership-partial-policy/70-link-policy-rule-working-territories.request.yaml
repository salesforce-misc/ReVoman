$kind: http-request
description: >-
  Link the WorkingTerritories rule to the MatchTerritory policy (active). With
  IsPrimaryLocationEnabled=true this makes slot generation include the Primary member, so the resource
  is surfaced and raw slots are generated across the search window; the per-slot MatchTerritory
  containment then prunes those slots down to the member's effective interval. Produces
  territoryPartialWorkingTerritoriesPolicyRuleId.
url: "{{baseUrl}}{{versionPath}}/tooling/sobjects/SchedulingPolicyRule"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "SchedulingPolicyId": "{{territoryPartialPolicyId}}",
      "SchedulingRuleId": "{{territoryPartialWorkingTerritoriesRuleId}}",
      "IsActive": true
    }
scripts:
  - type: afterResponse
    code: |-
      pm.environment.set("territoryPartialWorkingTerritoriesPolicyRuleId", pm.response.json().id);
    language: text/javascript
order: 70000

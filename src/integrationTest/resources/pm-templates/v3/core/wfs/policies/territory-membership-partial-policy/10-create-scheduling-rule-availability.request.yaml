$kind: http-request
description: >-
  Availability rule (SchedulingRuleType C, category A). Paired with the resource's wide member OH so
  every search-window slot is resource-available — Availability is the BASELINE here, not the pruner;
  MatchTerritory does the per-slot containment pruning.
url: "{{baseUrl}}{{versionPath}}/sobjects/SchedulingRule"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "MasterLabel": "TerritoryPartial Availability Test",
      "DeveloperName": "TerritoryPartial_Availability_Test_{{$timestamp}}",
      "SchedulingRuleType": "C",
      "SchedulingCategory": "A"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.environment.set("territoryPartialAvailabilityRuleId", pm.response.json().id);
    language: text/javascript
order: 10000

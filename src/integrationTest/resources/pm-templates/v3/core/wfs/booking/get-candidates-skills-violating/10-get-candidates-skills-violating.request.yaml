$kind: http-request
description: >-
  GetAppointmentCandidates for resourceB (skillsNonReqResourceBId) assigned as a REQUIRED resource,
  window tomorrow 11:00-12:00 UTC under the match-skills policy. Body mirrors the get-appointment-slots
  violating act EXCEPT it omits isPrimaryResource: the get-appointment-candidates action rejects
  isPrimaryResource in assignedResources up front with INVALID_INPUT "isPrimaryResource is not
  supported." (LIVE-OBSERVED 2026-07-01 — an input-validation difference on the candidates surface, NOT
  a rule difference), so we keep only isRequiredResource=true and let MatchSkills do the pruning.
  resourceB is a Primary open-ended member with a Confirmed Shift (08-16) so
  MatchTerritory/WorkingTerritories/Availability all pass — the ONLY rule that can fire is MatchSkills,
  because resourceB LACKS the ServiceResourceSkill the WorkType requires. MatchSkills prunes it, so the
  read offers ZERO candidates. Counts data.result[].candidates[] (the candidates action's list key,
  distinct from slots).
url: "{{baseUrl}}{{versionPath}}/connect/unified-scheduling/actions/get-appointment-candidates"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  x-revoman-ledger: "off"
  ignoreHTTPStatusUnsuccessful: "true"
body:
  type: json
  content: |-
    {
      "appointments": [
        {
          "schedulingMethod": "OnSite",
          "schedulingPolicyId": "{{matchSkillsNonReqPolicyId}}",
          "coreDetails": {
            "startTime": "{{skillsParityStart}}",
            "endTime": "{{skillsParityEnd}}",
            "appointmentMode": "Regular",
            "workConfiguration": { "workTypeId": "{{skillsNonReqWorkTypeId}}" },
            "locationConstraints": { "addressIds": ["{{skillsNonReqTerritoryId}}"] }
          },
          "serviceAppointmentParent": { "id": "{{skillsNonReqAccountId}}" },
          "assignedResources": [ { "isRequiredResource": true, "serviceResourceId": "{{skillsNonReqResourceBId}}" } ]
        }
      ]
    }
scripts:
  - type: beforeRequest
    code: |-
      // Tomorrow 11:00-12:00 UTC: fully inside member OH (08-16) + Confirmed Shift (08-16), so the only
      // rule that can fire is MatchSkills (resourceB lacks the required ServiceResourceSkill). Reuses the
      // same skillsParityStart/End set by the get-slots act (order 1000) but recomputed here so this act
      // is order-independent within the run.
      const s = new Date(); s.setUTCDate(s.getUTCDate() + 1); s.setUTCHours(11, 0, 0, 0);
      const e = new Date(s.getTime() + 60 * 60 * 1000);
      pm.environment.set("skillsParityStart", s.toISOString());
      pm.environment.set("skillsParityEnd", e.toISOString());
    language: text/javascript
  - type: afterResponse
    code: |-
      // MatchSkills prunes the skill-lacking required resource → get-appointment-candidates offers 0
      // candidates. The candidates action's list key is result[].candidates[] (verified against
      // GetAppointmentCandidatesOutputRepresentation) — distinct from get-appointment-slots' result[].slots[].
      const data = pm.response.json() || {};
      const results = data.result || [];
      let n = 0; results.forEach(r => { n += (r.candidates || []).length; });
      pm.environment.set("skillsCandidatesCount", String(n));
      console.log("RULESPARITY skills candidates=" + n);
    language: text/javascript
order: 1010

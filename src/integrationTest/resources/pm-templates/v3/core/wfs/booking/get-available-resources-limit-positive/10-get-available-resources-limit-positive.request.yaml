$kind: http-request
description: >-
  Decision 8 Act N (control) — GetAvailableResources with an explicit resourceLimitApptDistribution well
  above the seeded resource count (50) on the same default OnSite load-balancing policy + fixture. The cap
  is a deliberate no-op, so the post-rule candidate set comes back NON-empty — proving 0 is a literal
  cap-of-0, not "no limit". Read-only contract: HTTP 200, no exception. Stashes the availableResources count.
url: "{{baseUrl}}{{versionPath}}/connect/unified-scheduling/actions/get-available-resources"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  x-revoman-ledger: "off"
  ignoreHTTPStatusUnsuccessful: "true"
body:
  type: json
  content: |-
    {
      "parentRecordId": "{{requiredNonReqAccountId}}",
      "workTypeId": "{{requiredNonReqWorkTypeId}}",
      "territoryIds": ["{{requiredNonReqTerritoryId}}"],
      "limit": 50,
      "fieldLimit": 10,
      "resourceLimitApptDistribution": 50
    }
scripts:
  - type: afterResponse
    code: |-
      // availableResources is an array-of-arrays ([[ ...resources... ]]); flatten to count the real list.
      const data = pm.response.json() || {};
      const outer = data.availableResources || [];
      const list = outer.flat ? outer.flat() : [].concat.apply([], outer);
      pm.environment.set("limitPositiveResourceCount", String(Array.isArray(list) ? list.length : 0));
      let ec = null;
      if (Array.isArray(data) && data.length) { ec = data[0].errorCode; }
      pm.environment.set("limitPositiveErrorCode", ec);
    language: text/javascript
order: 1000

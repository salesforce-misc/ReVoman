  required-non-required fixture and RequiredResources policy as the write violating act
  (schedule-required-non-required-satisfier-violating). resourceA (isRequiredResource=true,
  isPrimaryResource=true) is clean but NOT on the Account's ResourcePreference(Required) list; resourceB

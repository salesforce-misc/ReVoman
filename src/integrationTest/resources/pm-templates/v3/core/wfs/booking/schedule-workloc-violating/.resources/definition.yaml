description: >-
  Rules parity (WorkingLocations / SchedulingRuleType WorkingTerritories) WRITE violating — Schedule
  the required+primary resource that is a SECONDARY ServiceTerritoryMember into the same window the read
  pruned. The write re-runs the SAME WorkingLocations rule (loadSchedulableSlots shared by read and
  write), so the booking is REJECTED (not Success). Matches the read offering 0 slots: read==write on
  WorkingLocations. Runs before the control write so its rejected, non-persisting attempt cannot affect
  availability.

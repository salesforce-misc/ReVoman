  candidate list while the free primary C is offered. Runs under {{managerToken}}. Contrast with the
  schedule action (write path), which books B anyway.
auth:
  - id: 8b2c3d4e-5f60-4172-9b8b-3c4d5e6f7182
    type: bearer
    name: bearer auth
    credentials:
      token: "{{managerToken}}"

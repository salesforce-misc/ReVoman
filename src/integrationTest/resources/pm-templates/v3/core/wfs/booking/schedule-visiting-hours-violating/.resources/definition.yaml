$kind: collection
description: >-
  Rules parity (ServiceAppointmentVisitingHours) WRITE violating — Schedule the fixture's
  required+primary resource into the same window the read pruned (tomorrow 09:00-10:00 UTC, OUTSIDE the
  Account's visiting hours 10-14). The write re-runs the SAME VisitingHours rule
  (loadSchedulableSlots shared by read and write), so the booking is REJECTED (schedulingStatus !=
  Success). Matches the read offering 0 slots: read==write on VisitingHours. The pruned candidate
  yields a generic INVALID_INPUT "not available for the requested slot" (status often null), so the
  assertion is status != Success; the dual-shape errorCode is captured for diagnostics only. Runs
  before the control write so its rejected, non-persisting attempt cannot affect availability.
auth:
  - id: 5e4f3a00-0003-4aaa-9bbb-000000000003
    type: bearer
    name: bearer auth
    credentials:
      token: "{{managerToken}}"

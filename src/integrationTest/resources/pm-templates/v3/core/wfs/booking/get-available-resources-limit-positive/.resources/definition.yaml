$kind: collection
description: |-
  Decision-8 Act N (CONTROL for the resource-limit cap). Calls GetAvailableResources (read-only) on the
  required-non-required fixture (Account/WorkType/Territory) under the default OnSite load-balancing policy
  (schedulingPolicyName omitted → default) with resourceLimitApptDistribution=50 — a cap deliberately set
  well ABOVE the seeded resource count, so it is a no-op and the post-rule candidate set comes back
  NON-empty. Paired with the limit-zero act, this proves that 0 is a literal cap-of-0 (Stream.limit(0)),
  not an "unlimited" sentinel. Read-only contract: HTTP 200, no exception. Runs as {{managerToken}} (the
  least-privilege manager persona that owns the fixture). Stashes limitPositiveResourceCount; assertions
  live in the Java test.
auth:
  - id: 8b2c3d4e-5f60-4172-9b3c-4d5e6f7a8b2d
    type: bearer
    name: bearer auth
    credentials:
      token: "{{managerToken}}"

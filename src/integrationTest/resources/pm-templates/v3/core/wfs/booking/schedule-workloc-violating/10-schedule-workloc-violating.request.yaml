$kind: http-request
description: >-
  Schedule resourceB (workingLocationsSecondaryNonReqResourceBId) as the required+primary resource into
  the same window tomorrow 11:00-12:00 UTC the read pruned. resourceB is a SECONDARY ServiceTerritoryMember
  and the policy's WorkingTerritories(IsPrimaryLocationEnabled=true) includes only PRIMARY members, so
  WorkingLocations vetoes it and the booking is REJECTED (schedulingStatus != Success). The pruned
  candidate yields a generic INVALID_INPUT "not available for the requested slot" (status often null), so
  the assertion is status != Success; the dual-shape errorCode is captured for diagnostics only. Runs
  before the control write so this rejected attempt cannot affect availability.
url: "{{baseUrl}}{{versionPath}}/connect/unified-scheduling/actions/schedule"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  x-revoman-ledger: "off"
  ignoreHTTPStatusUnsuccessful: "true"
body:
  type: json
  content: |-
    {
      "appointments": [
        {
          "schedulingMethod": "OnSite",
          "schedulingPolicyId": "{{territoryPartialPolicyId}}",
          "coreDetails": {
            "startTime": "{{worklocParityStart}}",
            "endTime": "{{worklocParityEnd}}",
            "status": "Scheduled",
            "subject": "Rules parity WorkingLocations violating write",
            "workConfiguration": { "workTypeId": "{{workingLocationsSecondaryNonReqWorkTypeId}}" },
            "locationConstraints": { "id": "{{workingLocationsSecondaryNonReqTerritoryId}}" }
          },
          "serviceAppointmentParent": { "id": "{{workingLocationsSecondaryNonReqAccountId}}" },
          "assignedResources": [ { "isPrimaryResource": true, "isRequiredResource": true, "serviceResourceId": "{{workingLocationsSecondaryNonReqResourceBId}}" } ]
        }
      ]
    }
scripts:
  - type: beforeRequest
    code: |-
      // Same tomorrow 11:00-12:00 UTC window as the reads; resourceB is a Secondary territory member so
      // WorkingTerritories(IsPrimaryLocationEnabled=true) vetoes → rejected.
      const s = new Date(); s.setUTCDate(s.getUTCDate() + 1); s.setUTCHours(11, 0, 0, 0);
      const e = new Date(s.getTime() + 60 * 60 * 1000);
      pm.environment.set("worklocParityStart", s.toISOString());
      pm.environment.set("worklocParityEnd", e.toISOString());
    language: text/javascript
  - type: afterResponse
    code: |-
      // Dual-shape verdict capture: schedulingStatus from appointments[0]; errorCode from either the
      // top-level ScheduleError array shape OR appointments[0].errors[0].
      pm.environment.set("worklocWriteViolatingHttpCode", String(pm.response.code));
      const data = pm.response.json();
      const appts = (data && data.appointments) || [];
      pm.environment.set("worklocWriteViolatingStatus", appts.length ? appts[0].schedulingStatus : null);
      let ec = null, msg = null;
      if (Array.isArray(data) && data.length) { ec = data[0].errorCode; msg = data[0].message; }
      else if (appts.length && appts[0].errors && appts[0].errors[0]) { ec = appts[0].errors[0].errorCode; msg = appts[0].errors[0].message; }
      pm.environment.set("worklocWriteViolatingErrorCode", ec);
      pm.environment.set("worklocWriteViolatingErrorMessage", msg);
      console.log("RULESPARITY workloc write-violating http=" + pm.response.code + " status=" + pm.environment.get("worklocWriteViolatingStatus") + " ec=" + ec + " msg=" + msg);
    language: text/javascript
order: 1200

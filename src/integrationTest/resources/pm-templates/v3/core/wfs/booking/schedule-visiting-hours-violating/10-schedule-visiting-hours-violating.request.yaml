$kind: http-request
description: >-
  Schedule the VisitingHours fixture's required+primary resource into tomorrow 09:00-10:00 UTC — inside
  member OH / Confirmed Shift (08-16) but OUTSIDE the Account's visiting hours (10-14), the same window
  the read pruned — under the Availability+WorkingTerritories+VisitingHours policy. The write re-runs
  the SAME ServiceAppointmentVisitingHours rule, so the booking is REJECTED (schedulingStatus !=
  Success). The pruned candidate yields a generic INVALID_INPUT "not available for the requested slot"
  (status often null), so the assertion is status != Success; the dual-shape errorCode is captured for
  diagnostics. Runs before the control write so this rejected attempt cannot affect availability.
url: "{{baseUrl}}{{versionPath}}/connect/unified-scheduling/actions/schedule"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  x-revoman-ledger: "off"
  ignoreHTTPStatusUnsuccessful: "true"
body:
  type: json
  content: |-
    {
      "appointments": [
        {
          "schedulingMethod": "OnSite",
          "schedulingPolicyId": "{{visitingHoursPolicyId}}",
          "coreDetails": {
            "startTime": "{{visitingHoursViolatingStart}}",
            "endTime": "{{visitingHoursViolatingEnd}}",
            "status": "Scheduled",
            "subject": "Rules parity VisitingHours violating write",
            "workConfiguration": { "workTypeId": "{{visitingHoursWorkTypeId}}" },
            "locationConstraints": { "id": "{{visitingHoursTerritoryId}}" }
          },
          "serviceAppointmentParent": { "id": "{{visitingHoursAccountId}}" },
          "assignedResources": [ { "isPrimaryResource": true, "isRequiredResource": true, "serviceResourceId": "{{visitingHoursResourceId}}" } ]
        }
      ]
    }
scripts:
  - type: beforeRequest
    code: |-
      // Same tomorrow 09:00-10:00 UTC window as the violating read; OUTSIDE Account visiting hours
      // (10-14), so ServiceAppointmentVisitingHours vetoes → rejected.
      const s = new Date(); s.setUTCDate(s.getUTCDate() + 1); s.setUTCHours(9, 0, 0, 0);
      const e = new Date(s.getTime() + 60 * 60 * 1000);
      pm.environment.set("visitingHoursViolatingStart", s.toISOString());
      pm.environment.set("visitingHoursViolatingEnd", e.toISOString());
    language: text/javascript
  - type: afterResponse
    code: |-
      // Dual-shape verdict capture: schedulingStatus from appointments[0]; errorCode from either the
      // top-level ScheduleError array shape OR appointments[0].errors[0].
      pm.environment.set("visitingHoursWriteViolatingHttpCode", String(pm.response.code));
      const data = pm.response.json();
      const appts = (data && data.appointments) || [];
      pm.environment.set("visitingHoursWriteViolatingStatus", appts.length ? appts[0].schedulingStatus : null);
      let ec = null, msg = null;
      if (Array.isArray(data) && data.length) { ec = data[0].errorCode; msg = data[0].message; }
      else if (appts.length && appts[0].errors && appts[0].errors[0]) { ec = appts[0].errors[0].errorCode; msg = appts[0].errors[0].message; }
      pm.environment.set("visitingHoursWriteViolatingErrorCode", ec);
      pm.environment.set("visitingHoursWriteViolatingErrorMessage", msg);
      console.log("RULESPARITY visitingHours write-violating http=" + pm.response.code + " status=" + pm.environment.get("visitingHoursWriteViolatingStatus") + " ec=" + ec + " msg=" + msg);
    language: text/javascript
order: 1200

$kind: http-request
description: >-
  CONTROL — Schedule the VisitingHours fixture's required+primary resource into tomorrow 11:00-12:00
  UTC, a window fully INSIDE the Account's visiting hours (10-14), the same window the read offered
  slots for → Success. ServiceAppointmentVisitingHours passes (the window is contained in the visiting
  hours), so the write books Success — keeping the read's promise. Captures schedulingStatus + a
  single-shape errorCode for diagnosability. Runs LAST (it persists an SA).
url: "{{baseUrl}}{{versionPath}}/connect/unified-scheduling/actions/schedule"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  x-revoman-ledger: "off"
  ignoreHTTPStatusUnsuccessful: "true"
body:
  type: json
  content: |-
    {
      "appointments": [
        {
          "schedulingMethod": "OnSite",
          "schedulingPolicyId": "{{visitingHoursPolicyId}}",
          "coreDetails": {
            "startTime": "{{visitingHoursControlStart}}",
            "endTime": "{{visitingHoursControlEnd}}",
            "status": "Scheduled",
            "subject": "Rules parity VisitingHours control write",
            "workConfiguration": { "workTypeId": "{{visitingHoursWorkTypeId}}" },
            "locationConstraints": { "id": "{{visitingHoursTerritoryId}}" }
          },
          "serviceAppointmentParent": { "id": "{{visitingHoursAccountId}}" },
          "assignedResources": [ { "isPrimaryResource": true, "isRequiredResource": true, "serviceResourceId": "{{visitingHoursResourceId}}" } ]
        }
      ]
    }
scripts:
  - type: beforeRequest
    code: |-
      // Same tomorrow 11:00-12:00 UTC window as the control read; INSIDE Account visiting hours (10-14),
      // so ServiceAppointmentVisitingHours passes → Success.
      const s = new Date(); s.setUTCDate(s.getUTCDate() + 1); s.setUTCHours(11, 0, 0, 0);
      const e = new Date(s.getTime() + 60 * 60 * 1000);
      pm.environment.set("visitingHoursControlStart", s.toISOString());
      pm.environment.set("visitingHoursControlEnd", e.toISOString());
    language: text/javascript
  - type: afterResponse
    code: |-
      // Capture the single appointment's schedulingStatus for the JUnit Truth assertion (expected Success),
      // plus a single-shape errorCode for diagnosability if it unexpectedly does not Succeed.
      const data = pm.response.json();
      const appts = (data && data.appointments) || [];
      pm.environment.set("visitingHoursWriteControlStatus", appts.length ? appts[0].schedulingStatus : null);
      let ec = null;
      if (appts.length && appts[0].errors && appts[0].errors[0]) { ec = appts[0].errors[0].errorCode; }
      pm.environment.set("visitingHoursWriteControlErrorCode", ec);
      console.log("RULESPARITY visitingHours write-control http=" + pm.response.code + " status=" + pm.environment.get("visitingHoursWriteControlStatus") + " ec=" + ec);
    language: text/javascript
order: 1300

$kind: collection
description: >-
  Rules parity (AppointmentStartTimeInterval) WRITE violating — Schedule the fixture's required+primary
  resource into the same window the read pruned (tomorrow 11:30-12:30 UTC, OFF the policy's 60-min
  interval boundary). The write re-runs the SAME start-time-interval stepping (loadSchedulableSlots shared
  by read and write): the off-boundary start has no surviving hour-aligned slot inside the window, so the
  booking is REJECTED (schedulingStatus != Success). Matches the read offering 0 slots: read==write on
  AppointmentStartTimeInterval. The pruned candidate yields a generic INVALID_INPUT "not available for the
  requested slot" (status often null), so the assertion is status != Success; the dual-shape errorCode is
  captured for diagnostics only. Runs before the control write so its rejected, non-persisting attempt
  cannot affect availability.
auth:
  - id: 6f5a4b00-0003-4aaa-9bbb-000000000003
    type: bearer
    name: bearer auth
    credentials:
      token: "{{managerToken}}"

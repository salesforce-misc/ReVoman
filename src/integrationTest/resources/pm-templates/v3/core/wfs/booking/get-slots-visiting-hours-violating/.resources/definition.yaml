$kind: collection
description: >-
  Rules parity (ServiceAppointmentVisitingHours) READ violating — GetAppointmentSlots for the fixture's
  required+primary resource over a window (tomorrow 09:00-10:00 UTC) that is inside the resource's
  member OH / Confirmed Shift (08-16) but OUTSIDE the parent Account's visiting hours (10-14). The
  Availability + WorkingTerritories(IsPrimaryLocationEnabled) rules pass, so raw slot-gen would surface
  the resource; the per-slot ServiceAppointmentVisitingHours rule then prunes every slot not fully
  inside 10-14, so the read offers ZERO slots. Paired with the write violating act to prove read==write
  on VisitingHours.
auth:
  - id: 5e4f3a00-0001-4aaa-9bbb-000000000001
    type: bearer
    name: bearer auth
    credentials:
      token: "{{managerToken}}"

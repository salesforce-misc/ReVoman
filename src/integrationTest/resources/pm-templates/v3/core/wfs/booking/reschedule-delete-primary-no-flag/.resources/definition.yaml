$kind: collection
description: |-
  Decision 4z Arm B — reschedules the SAME SA, DeleteOperation on the primary resourceA WITHOUT
  isPrimaryResource on the delete entry (only operation + serviceResourceId). The payload-field guard does
  not fire (no flag sent), and RescheduleCommonValidator.validatePrimaryResourceCount explicitly ALLOWS
  zero primaries for reschedule (it only throws MultiplePrimary when primaryCount > 1). There is therefore
  NO "must keep a primary" rule — which REFUTES the product doc's blanket "not possible to reschedule
  without a primary." LIVE-OBSERVED on the 262 org under test: the request is NOT Success; it is rejected
  with INVALID_INPUT / "The service resources are not available for the requested slot." (SlotNotAvailable),
  a DOWNSTREAM AVAILABILITY re-check, NOT a no-primary rejection. 264 reworked reschedule availability — an
  effective-set merge that re-evaluates the REAL surviving crew (existing − deleted ∪ created ∪ updated) so
  the surviving-crew slot is found — and that rework is 264-only (verified by branch diff against 262: the
  effective-set merge + rule-enforcer files are absent on 262); 262 lacks it, so this org's reschedule
  slot-gen returns no slot for the surviving non-primary crew. (264 also has an empty-effective-set
  short-circuit, the one a func-test like testRescheduleAppointmentDeleteAllAssignedResources relies on, but
  it fires only for delete-ALL — NOT for this delete-primary-leaving-one case.) The test characterizes the
  OBSERVED verdict faithfully (rejected by availability, never by a primary-count/required-primary error)
  rather than forcing a Success the 262 org cannot produce.

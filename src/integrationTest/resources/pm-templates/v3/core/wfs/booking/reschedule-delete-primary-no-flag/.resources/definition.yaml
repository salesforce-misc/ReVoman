$kind: collection
description: |-
  Decision 4z Arm B — reschedules the SAME SA, DeleteOperation on the primary resourceA WITHOUT
  isPrimaryResource on the delete entry (only operation + serviceResourceId). The payload-field guard does
  not fire (no flag sent), and RescheduleCommonValidator.validatePrimaryResourceCount explicitly ALLOWS
  zero primaries for reschedule (it only throws MultiplePrimary when primaryCount > 1). There is therefore
  NO "must keep a primary" rule — which REFUTES the product doc's blanket "not possible to reschedule
  without a primary." LIVE-OBSERVED on the 262 org under test: the request is NOT Success; it is rejected
  with INVALID_INPUT / "The service resources are not available for the requested slot." (SlotNotAvailable),
  a DOWNSTREAM AVAILABILITY re-check, NOT a no-primary rejection. The empty/no-op reschedule availability
  short-circuit (which lets a func-test like testRescheduleAppointmentDeleteAllAssignedResources succeed)
  was only added in 264 (precommit 58140158); 262 lacks it, so this org's reschedule slot-gen returns no
  slot. The test characterizes the OBSERVED verdict faithfully (rejected by availability, never by a
  primary-count/required-primary error) rather than forcing a Success the 262 org cannot produce.
auth:

$kind: collection
description: >-
  Rules parity (MatchSkills) WRITE violating — Schedule the required+primary resource that LACKS the
  WorkType's required skill into the same window the read pruned. The write re-runs the SAME MatchSkills
  rule (loadSchedulableSlots shared by read and write), so the booking is REJECTED (not Success). Matches
  the read offering 0 slots: read==write on MatchSkills. Runs before the control write so its rejected,
  non-persisting attempt cannot affect availability.

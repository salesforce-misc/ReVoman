$kind: http-request
description: >-
  PRIOR-ASSIGNMENT fixture for the 1.* parity vertical-slice — builds the data graph in one
  composite/graph call as {{managerToken}}. Territory OH 08-16, THREE User-backed ServiceResources on
  DISTINCT users (ServiceResource is DB-unique on (RelatedRecordId, ResourceType)): resourceA on
  caseWorkerUserId, resourceB on caseManagerUserId, resourceC on priorResourceCUserId (admin-minted by the
  05-create-resource-c-user.request in the same folder, order 400, because creating a User needs Manage
  Users which the manager lacks). ALL THREE are PRIMARY ServiceTerritoryMembers effective a month ago.
  Availability is the UNION of member OH and Shift (AvailabilityRuleCheck: bookable iff the window fits
  OH ∪ Shift). All three resources have member OH 10:00-14:00 + Confirmed Shift 10:00-14:00 → all are
  AVAILABLE at 11:00. B is the shared worker between the two bookings (parity scenario 1.* fan-out:
  Decision 2's appt#1 books A+B; appt#2 books B+C; both at 11:00). TWO Accounts (Account + Account2). One
  OnSite WorkType (30m) + STWT. Emits priorTerritoryId / priorWorkTypeId / priorAccountId /
  priorAccountId2 / priorResourceAId / priorResourceBId / priorResourceCId. No competing SA seed needed;
  the prior-assignment conflict is triggered by the second booking reusing resourceB.
url: "{{baseUrl}}{{versionPath}}/composite/graph"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-

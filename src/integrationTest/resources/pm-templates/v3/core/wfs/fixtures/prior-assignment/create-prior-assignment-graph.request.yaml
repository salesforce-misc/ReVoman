scripts:
  - type: beforeRequest
    code: |-
      // STM effective from a month ago (open-ended) so the Shifts validate.
      const monthAgo = new Date();
      monthAgo.setUTCMonth(monthAgo.getUTCMonth() - 1);
      pm.environment.set("doubleBookStmEffectiveStart", monthAgo.toISOString());
      // Availability is the UNION of member OH and Shift (AvailabilityRuleCheck: bookable iff the window
      // fits OH ∪ Shift). All three resources have member OH 10:00-14:00 + Shift 10:00-14:00 → all are
      // AVAILABLE at 11:00. B is the shared worker between the two bookings (parity scenario 1.* fan-out:
      // appt#1 books A+B at 11:00; appt#2 books B+C at 11:00; both at 11:00 → prior-assignment conflict).
      // resourceA: member OH A 10:00-14:00 + Shift 10:00-14:00 → available at 11:00.
      const shiftAStart = new Date();
      shiftAStart.setUTCDate(shiftAStart.getUTCDate() + 1);
      shiftAStart.setUTCHours(10, 0, 0, 0);
      const shiftAEnd = new Date(shiftAStart.getTime());
      shiftAEnd.setUTCHours(14, 0, 0, 0);
      pm.environment.set("doubleBookShiftAStart", shiftAStart.toISOString());
      pm.environment.set("doubleBookShiftAEnd", shiftAEnd.toISOString());
      // resourceB: member OH B 10:00-14:00 + Shift 10:00-14:00 → available at 11:00 (the shared worker).
      const shiftBStart = new Date();
      shiftBStart.setUTCDate(shiftBStart.getUTCDate() + 1);
      shiftBStart.setUTCHours(10, 0, 0, 0);
      const shiftBEnd = new Date(shiftBStart.getTime());
      shiftBEnd.setUTCHours(14, 0, 0, 0);
      pm.environment.set("doubleBookShiftBStart", shiftBStart.toISOString());
      pm.environment.set("doubleBookShiftBEnd", shiftBEnd.toISOString());
      // resourceC: member OH C 10:00-14:00 + Shift 10:00-14:00 → available at 11:00.
      const shiftCStart = new Date();
      shiftCStart.setUTCDate(shiftCStart.getUTCDate() + 1);
      shiftCStart.setUTCHours(10, 0, 0, 0);
      const shiftCEnd = new Date(shiftCStart.getTime());
      shiftCEnd.setUTCHours(14, 0, 0, 0);
      pm.environment.set("doubleBookShiftCStart", shiftCStart.toISOString());
      pm.environment.set("doubleBookShiftCEnd", shiftCEnd.toISOString());
    language: text/javascript
  - type: afterResponse
    code: |-
      const jsonData = pm.response.json();
      const responses = jsonData.graphs[0].graphResponse.compositeResponse;
      responses.forEach((r) => {
        if (r.httpStatusCode < 200 || r.httpStatusCode >= 300) {
          throw new Error("Composite step " + r.referenceId + " failed: " + JSON.stringify(r.body));
        }
      });
      const byRef = {};
      responses.forEach(r => { byRef[r.referenceId] = r.body && r.body.id; });
      pm.environment.set("priorTerritoryId", byRef["refTerritory"]);
      pm.environment.set("priorWorkTypeId", byRef["refWorkType"]);
      pm.environment.set("priorAccountId", byRef["refAccount"]);
      pm.environment.set("priorAccountId2", byRef["refAccount2"]);
      pm.environment.set("priorResourceAId", byRef["refResourceA"]);
      pm.environment.set("priorResourceBId", byRef["refResourceB"]);
      pm.environment.set("priorResourceCId", byRef["refResourceC"]);
    language: text/javascript
order: 500

$kind: http-request
description: >-
  Builds the AppointmentStartTimeInterval data graph in one composite/graph call. Resource is available
  all day (member OH 08-16 == territory OH 08-16, GMT) so Availability(ConsiderOpHoursAndShiftsUnion)
  keeps the whole 08-16 window; the policy's AppointmentStartTimeInterval (60 min) is then the only rule
  that decides which starts survive. WorkType is 60m with NO SchedulingMethod/IsRegular and NO
  AppointmentStartTimeInterval (so the policy interval is used, not a WorkType override). Sets
  stiTerritoryId / stiResourceId / stiAccountId / stiWorkTypeId.
url: "{{baseUrl}}{{versionPath}}/composite/graph"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "graphs": [
        {
          "graphId": "startTimeInterval",
          "compositeRequest": [
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/OperatingHours",
              "referenceId": "refTerritoryOh",
              "body": { "Name": "STI Territory OH {{$timestamp}}", "TimeZone": "GMT" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/OperatingHours",
              "referenceId": "refMemberOh",
              "body": { "Name": "STI Member OH {{$timestamp}}", "TimeZone": "GMT" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/TimeSlot",
              "referenceId": "refTerritoryTsMon",
              "body": { "OperatingHoursId": "@{refTerritoryOh.id}", "DayOfWeek": "Monday", "Type": "Normal", "SchedulingMethod": "OnSite", "StartTime": "08:00:00.000Z", "EndTime": "16:00:00.000Z" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/TimeSlot",
              "referenceId": "refTerritoryTsTue",
              "body": { "OperatingHoursId": "@{refTerritoryOh.id}", "DayOfWeek": "Tuesday", "Type": "Normal", "SchedulingMethod": "OnSite", "StartTime": "08:00:00.000Z", "EndTime": "16:00:00.000Z" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/TimeSlot",
              "referenceId": "refTerritoryTsWed",
              "body": { "OperatingHoursId": "@{refTerritoryOh.id}", "DayOfWeek": "Wednesday", "Type": "Normal", "SchedulingMethod": "OnSite", "StartTime": "08:00:00.000Z", "EndTime": "16:00:00.000Z" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/TimeSlot",
              "referenceId": "refTerritoryTsThu",
              "body": { "OperatingHoursId": "@{refTerritoryOh.id}", "DayOfWeek": "Thursday", "Type": "Normal", "SchedulingMethod": "OnSite", "StartTime": "08:00:00.000Z", "EndTime": "16:00:00.000Z" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/TimeSlot",
              "referenceId": "refTerritoryTsFri",
              "body": { "OperatingHoursId": "@{refTerritoryOh.id}", "DayOfWeek": "Friday", "Type": "Normal", "SchedulingMethod": "OnSite", "StartTime": "08:00:00.000Z", "EndTime": "16:00:00.000Z" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/TimeSlot",
              "referenceId": "refTerritoryTsSat",
              "body": { "OperatingHoursId": "@{refTerritoryOh.id}", "DayOfWeek": "Saturday", "Type": "Normal", "SchedulingMethod": "OnSite", "StartTime": "08:00:00.000Z", "EndTime": "16:00:00.000Z" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/TimeSlot",
              "referenceId": "refTerritoryTsSun",
              "body": { "OperatingHoursId": "@{refTerritoryOh.id}", "DayOfWeek": "Sunday", "Type": "Normal", "SchedulingMethod": "OnSite", "StartTime": "08:00:00.000Z", "EndTime": "16:00:00.000Z" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/TimeSlot",
              "referenceId": "refMemberTsMon",
              "body": { "OperatingHoursId": "@{refMemberOh.id}", "DayOfWeek": "Monday", "Type": "Normal", "SchedulingMethod": "OnSite", "StartTime": "08:00:00.000Z", "EndTime": "16:00:00.000Z" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/TimeSlot",
              "referenceId": "refMemberTsTue",
              "body": { "OperatingHoursId": "@{refMemberOh.id}", "DayOfWeek": "Tuesday", "Type": "Normal", "SchedulingMethod": "OnSite", "StartTime": "08:00:00.000Z", "EndTime": "16:00:00.000Z" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/TimeSlot",
              "referenceId": "refMemberTsWed",
              "body": { "OperatingHoursId": "@{refMemberOh.id}", "DayOfWeek": "Wednesday", "Type": "Normal", "SchedulingMethod": "OnSite", "StartTime": "08:00:00.000Z", "EndTime": "16:00:00.000Z" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/TimeSlot",
              "referenceId": "refMemberTsThu",
              "body": { "OperatingHoursId": "@{refMemberOh.id}", "DayOfWeek": "Thursday", "Type": "Normal", "SchedulingMethod": "OnSite", "StartTime": "08:00:00.000Z", "EndTime": "16:00:00.000Z" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/TimeSlot",
              "referenceId": "refMemberTsFri",
              "body": { "OperatingHoursId": "@{refMemberOh.id}", "DayOfWeek": "Friday", "Type": "Normal", "SchedulingMethod": "OnSite", "StartTime": "08:00:00.000Z", "EndTime": "16:00:00.000Z" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/TimeSlot",
              "referenceId": "refMemberTsSat",
              "body": { "OperatingHoursId": "@{refMemberOh.id}", "DayOfWeek": "Saturday", "Type": "Normal", "SchedulingMethod": "OnSite", "StartTime": "08:00:00.000Z", "EndTime": "16:00:00.000Z" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/TimeSlot",
              "referenceId": "refMemberTsSun",
              "body": { "OperatingHoursId": "@{refMemberOh.id}", "DayOfWeek": "Sunday", "Type": "Normal", "SchedulingMethod": "OnSite", "StartTime": "08:00:00.000Z", "EndTime": "16:00:00.000Z" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/ServiceTerritory",
              "referenceId": "refTerritory",
              "body": { "Name": "STI Territory {{$timestamp}}", "OperatingHoursId": "@{refTerritoryOh.id}", "IsActive": true }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/WorkType",
              "referenceId": "refWorkType",
              "body": { "Name": "STI WorkType {{$timestamp}}", "DurationType": "Minutes", "EstimatedDuration": 60 }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/ServiceTerritoryWorkType",
              "referenceId": "refStwt",
              "body": { "ServiceTerritoryId": "@{refTerritory.id}", "WorkTypeId": "@{refWorkType.id}" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/ServiceResource",
              "referenceId": "refResource",
              "body": { "Name": "STI Resource {{$timestamp}}", "RelatedRecordId": "{{caseWorkerUserId}}", "ResourceType": "T", "IsActive": true, "IsPrimary": true }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/ServiceTerritoryMember",
              "referenceId": "refStm",
              "body": { "ServiceTerritoryId": "@{refTerritory.id}", "ServiceResourceId": "@{refResource.id}", "TerritoryType": "P", "OperatingHoursId": "@{refMemberOh.id}", "EffectiveStartDate": "{{stiStmEffectiveStart}}" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/Shift",
              "referenceId": "refShift",
              "body": { "ServiceResourceId": "@{refResource.id}", "ServiceTerritoryId": "@{refTerritory.id}", "StartTime": "{{stiShiftStart}}", "EndTime": "{{stiShiftEnd}}", "TimeSlotType": "Normal", "SchedulingMethod": "OnSite", "Status": "Confirmed" }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/Account",
              "referenceId": "refAccount",
              "body": { "Name": "STI Account {{$timestamp}}" }
            }
          ]
        }
      ]
    }
scripts:
  - type: beforeRequest
    code: |-
      // STM effective from a month ago and open-ended, so the Shift insert validator (which requires
      // the Shift to be contained in the membership interval) accepts the full-day 08-16 Shift.
      const monthAgo = new Date();
      monthAgo.setUTCMonth(monthAgo.getUTCMonth() - 1);
      pm.environment.set("stiStmEffectiveStart", monthAgo.toISOString());
      // Confirmed Shift covering tomorrow 08:00-16:00 UTC. Since W-22901809 slot generation
      // unconditionally requires a Shift, the resource needs a Shift spanning the whole 08-16 window for
      // any slot to generate; the AppointmentStartTimeInterval (60) then anchors/steps the starts.
      const shiftStart = new Date();
      shiftStart.setUTCDate(shiftStart.getUTCDate() + 1);
      shiftStart.setUTCHours(8, 0, 0, 0);
      const shiftEnd = new Date(shiftStart.getTime());
      shiftEnd.setUTCHours(16, 0, 0, 0);
      pm.environment.set("stiShiftStart", shiftStart.toISOString());
      pm.environment.set("stiShiftEnd", shiftEnd.toISOString());
    language: text/javascript
  - type: afterResponse
    code: |-
      const jsonData = pm.response.json();
      const responses = jsonData.graphs[0].graphResponse.compositeResponse;
      responses.forEach((r) => {
        if (r.httpStatusCode < 200 || r.httpStatusCode >= 300) {
          throw new Error("Composite step " + r.referenceId + " failed: " + JSON.stringify(r.body));
        }
      });
      const byRef = {};
      responses.forEach(r => { byRef[r.referenceId] = r.body && r.body.id; });
      pm.environment.set("stiTerritoryId", byRef["refTerritory"]);
      pm.environment.set("stiResourceId", byRef["refResource"]);
      pm.environment.set("stiAccountId", byRef["refAccount"]);
      pm.environment.set("stiWorkTypeId", byRef["refWorkType"]);
      pm.environment.set("stiStwtId", byRef["refStwt"]);
      pm.environment.set("stiStmId", byRef["refStm"]);
      pm.environment.set("stiShiftId", byRef["refShift"]);
      pm.environment.set("stiTerritoryOhId", byRef["refTerritoryOh"]);
      pm.environment.set("stiMemberOhId", byRef["refMemberOh"]);
    language: text/javascript
order: 500

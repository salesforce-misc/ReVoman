$kind: http-request
description: Decision 9 — set the manager persona's password so it can SOAP-login to its own session.
url: "{{baseUrl}}{{versionPath}}/sobjects/User/{{dec9ManagerUserId}}/password"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    { "NewPassword": "{{dec9PersonaPassword}}" }
scripts:
  - type: beforeRequest
    code: if (!pm.environment.get("dec9PersonaPassword")) pm.environment.set("dec9PersonaPassword", "Revoman123!");
    language: text/javascript
order: 20000

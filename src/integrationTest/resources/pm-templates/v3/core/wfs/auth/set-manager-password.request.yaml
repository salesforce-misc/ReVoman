$kind: http-request
description: >-
  Set the manager persona's password (admin-created in create-manager as caseManagerUserId) so it can
  SOAP-login to its OWN session. Admin-token step (only admin can set another user's password). Mirrors
  the Decision-9 auth-personas-dec9 20-set-manager-password recipe. Runs after create-manager (17000),
  before login-as-manager (18000).
url: "{{baseUrl}}{{versionPath}}/sobjects/User/{{caseManagerUserId}}/password"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    { "NewPassword": "{{managerPersonaPassword}}" }
scripts:
  - type: beforeRequest
    code: if (!pm.environment.get("managerPersonaPassword")) pm.environment.set("managerPersonaPassword", "Revoman123!");
    language: text/javascript
order: 17500

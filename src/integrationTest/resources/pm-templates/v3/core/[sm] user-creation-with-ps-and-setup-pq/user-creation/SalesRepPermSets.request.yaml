$kind: http-request
url: "{{baseUrl}}{{versionPath}}/query/?q=SELECT Id, Name FROM PermissionSet WHERE Id IN (SELECT PermissionSetId FROM PermissionSetGroupComponent WHERE PermissionSetGroup.DeveloperName IN ('SubscriptionManagementSalesRep'))"
method: GET
headers:
  Content-Type: application/json
queryParams:
  q: SELECT Id, Name FROM PermissionSet WHERE Id IN (SELECT PermissionSetId FROM PermissionSetGroupComponent WHERE PermissionSetGroup.DeveloperName IN ('SubscriptionManagementSalesRep'))
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      jsonData.records.forEach((record, index) => {
          pm.environment.set("salesRepPS" + (index + 1) + "Id", record.Id)
      })
    language: text/javascript
order: 10000

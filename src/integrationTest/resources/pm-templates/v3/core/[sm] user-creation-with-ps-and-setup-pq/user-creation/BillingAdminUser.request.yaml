$kind: http-request
url: "{{baseUrl}}{{versionPath}}/composite/graph"
method: POST
body:
  type: json
  content: |-
    {
      "graphs": [
        {
          "graphId": "1",
          "compositeRequest": [
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/User",
              "referenceId": "refUser",
              "body": {
                "Username": "{{billingAdminUserName}}",
                "Alias": "bAdmin",
                "ProfileId": "{{standardUserProfileId}}",
                "Email": "{{$randomEmail}}",
                "EmailEncodingKey": "ISO-8859-1",
                "LastName": "Cloudy",
                "LanguageLocaleKey": "en_US",
                "LocaleSidKey": "en_US",
                "TimeZoneSidKey": "America/Los_Angeles"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/PermissionSetAssignment/",
              "referenceId": "billingAdminPS1Assignment",
              "body": {
                "AssigneeId": "@{refUser.id}",
                "PermissionSetId": "{{billingAdminPS1Id}}"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/PermissionSetAssignment/",
              "referenceId": "billingAdminPS2Assignment",
              "body": {
                "AssigneeId": "@{refUser.id}",
                "PermissionSetId": "{{billingAdminPS2Id}}"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/PermissionSetAssignment/",
              "referenceId": "billingAdminPS3Assignment",
              "body": {
                "AssigneeId": "@{refUser.id}",
                "PermissionSetId": "{{billingAdminPS3Id}}"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/PermissionSetAssignment/",
              "referenceId": "billingAdminPS4Assignment",
              "body": {
                "AssigneeId": "@{refUser.id}",
                "PermissionSetId": "{{billingAdminPS4Id}}"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/PermissionSetAssignment/",
              "referenceId": "billingAdminPS5Assignment",
              "body": {
                "AssigneeId": "@{refUser.id}",
                "PermissionSetId": "{{billingAdminPS5Id}}"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/PermissionSetAssignment/",
              "referenceId": "billingAdminPS6Assignment",
              "body": {
                "AssigneeId": "@{refUser.id}",
                "PermissionSetId": "{{billingAdminPS6Id}}"
              }
            }
          ]
        }
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: beforeRequest
    code: pm.environment.set("billingAdminUserName", pm.variables.replaceIn("billingAdmin-sm-{{$timestamp}}@revoman.org"));
    language: text/javascript
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json()
      pm.environment.set("billingAdminUserId", jsonData.graphs[0].graphResponse.compositeResponse[0].body.id);
    language: text/javascript
order: 5000

$kind: http-request
url: "{{baseUrl}}{{versionPath}}/sobjects/Product2/"
method: POST
body:
  type: json
  content: |-
    {
        "Name": "One-Time",
        "ProductCode": "OneTime",
        "IsActive": true,
        "Type": "Bundle",
        "BillingPolicyId": "{{billingPolicyId}}",
        "TaxPolicyId": "{{taxPolicyId}}"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json()
      if(jsonData.id!=null){
          pm.environment.set("oneTimeProductId", jsonData.id);
      }
    language: text/javascript
order: 1000

$kind: http-request
url: "{{baseUrl}}{{versionPath}}/tooling/sobjects/NamedCredential"
method: POST
body:
  type: json
  content: |-
    {
        "FullName": "TaxNamedCred_{{$randomInt}}",
        "Metadata": {
            "allowMergeFieldsInBody": "false",
            "allowMergeFieldsInHeader": "false",
            "label": "Mock",
            "endpoint": "https://mockendpoint.free.beeceptor.com",
            "principalType": "NamedUser",
            "protocol": "Password",
            "username": "MockUsername",
            "password":"MockPassword",
            "generateAuthorizationHeader": "true"
        }
    }
scripts:
  - type: afterResponse
    code: |
      var jsonData = pm.response.json()
      pm.environment.set("namedCredentialId", jsonData.id);
    language: text/javascript
order: 6000

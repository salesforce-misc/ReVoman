$kind: http-request
url: "{{baseUrl}}{{versionPath}}/sobjects/ProductSellingModelOption/"
method: POST
body:
  type: json
  content: |-
    {
        "ProductSellingModelId": "{{evergreenProductSellingModelId}}",
        "Product2Id": "{{evergreenProductId}}",
        "ProrationPolicyId": "{{prorationPolicyId}}"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json()
      pm.environment.set("evergreenProductSellingModelOptionId", jsonData.id);
    language: text/javascript
order: 4000

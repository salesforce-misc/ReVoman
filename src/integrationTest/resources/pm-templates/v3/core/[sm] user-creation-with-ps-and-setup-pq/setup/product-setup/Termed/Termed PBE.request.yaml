$kind: http-request
url: "{{baseUrl}}{{versionPath}}/sobjects/pricebookentry/"
method: POST
body:
  type: json
  content: |-
    {
        "ProductSellingModelId": "{{termedProductSellingModelId}}",
        "Product2Id": "{{termedProductId}}",
        "IsActive": true,
        "Pricebook2Id": "{{standardPricebookId}}",
        "UnitPrice": "{{$unitPrice}}"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json()
      pm.environment.set("termedPriceBookEntryId", jsonData.id);
    language: text/javascript
order: 5000

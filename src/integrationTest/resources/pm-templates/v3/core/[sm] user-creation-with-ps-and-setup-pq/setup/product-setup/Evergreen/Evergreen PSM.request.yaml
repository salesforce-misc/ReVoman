$kind: http-request
url: "{{baseUrl}}{{versionPath}}/sobjects/ProductSellingModel/"
method: POST
headers:
  ignoreHTTPStatusUnsuccessful: "true"
body:
  type: json
  content: |-
    {
        "SellingModelType": "Evergreen",
        "PricingTerm": 1,
        "PricingTermUnit": "Months",
        "Name": "Monthly Evergreen PSM",
        "Status": "Active"
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json()
      pm.environment.set("evergreenProductSellingModelId", jsonData.id);
    language: text/javascript
order: 2000

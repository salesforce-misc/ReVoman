$kind: http-request
url: "{{baseUrl}}{{versionPath}}/composite/graph"
method: POST
body:
  type: json
  content: |-
    {
      "graphs": [
        {
          "graphId": "1",
          "compositeRequest": [
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/User",
              "referenceId": "refUser",
              "body": {
                "Username": "{{billingOpsUserName}}",
                "Alias": "billOps",
                "ProfileId": "{{standardUserProfileId}}",
                "Email": "{{billingOpsUserName}}",
                "EmailEncodingKey": "ISO-8859-1",
                "LastName": "Brian",
                "LanguageLocaleKey": "en_US",
                "LocaleSidKey": "en_US",
                "TimeZoneSidKey": "America/Los_Angeles"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/PermissionSetAssignment/",
              "referenceId": "billingOpsPS1Assignment",
              "body": {
                "AssigneeId": "@{refUser.id}",
                "PermissionSetId": "{{billingOpsPS1Id}}"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/PermissionSetAssignment/",
              "referenceId": "billingOpsPS2Assignment",
              "body": {
                "AssigneeId": "@{refUser.id}",
                "PermissionSetId": "{{billingOpsPS2Id}}"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/PermissionSetAssignment/",
              "referenceId": "billingOpsPS3Assignment",
              "body": {
                "AssigneeId": "@{refUser.id}",
                "PermissionSetId": "{{billingOpsPS3Id}}"
              }
            }
          ]
        }
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: beforeRequest
    code: pm.environment.set("billingOpsUserName", pm.variables.replaceIn("billingOps-rlm-{{$timestamp}}@revoman.org"));
    language: text/javascript
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json()
      pm.environment.set("billingOpsUserId", jsonData.graphs[0].graphResponse.compositeResponse[0].body.id);
    language: text/javascript
order: 13000

$kind: http-request
url: "{{baseUrl}}{{versionPath}}/query/?q=SELECT Id FROM PermissionSet WHERE Name IN ({{taxAdminPermSets}})"
method: GET
headers:
  Content-Type: application/json
queryParams:
  q: SELECT Id FROM PermissionSet WHERE Name IN ({{taxAdminPermSets}})
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      jsonData.records.forEach((record, index) => {
          pm.environment.set("taxAdminPS" + (index + 1) + "Id", record.Id)
      })
    language: text/javascript
  - type: beforeRequest
    code: pm.environment.set("taxAdminPermSets", "'RevLifecycleManagementTaxConfiguration', 'RevenueLifecycleManagementBillingTaxAdmin'")
    language: text/javascript
order: 4000

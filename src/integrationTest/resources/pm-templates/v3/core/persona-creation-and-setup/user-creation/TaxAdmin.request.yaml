$kind: http-request
url: "{{baseUrl}}{{versionPath}}/composite/graph"
method: POST
body:
  type: json
  content: |-
    {
      "graphs": [
        {
          "graphId": "1",
          "compositeRequest": [
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/User",
              "referenceId": "refUser",
              "body": {
                "Username": "{{taxAdminUserName}}",
                "ProfileId": "{{standardUserProfileId}}",
                "Alias": "taxAdmin",
                "Email": "{{taxAdminUserName}}",
                "EmailEncodingKey": "ISO-8859-1",
                "LastName": "TaxAdmin",
                "LanguageLocaleKey": "en_US",
                "LocaleSidKey": "en_US",
                "TimeZoneSidKey": "America/Los_Angeles"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/PermissionSetAssignment/",
              "referenceId": "taxAdminPS1Assignment",
              "body": {
                "AssigneeId": "@{refUser.id}",
                "PermissionSetId": "{{taxAdminPS1Id}}"
              }
            }
          ]
        }
      ]
    }
scripts:
  - type: beforeRequest
    code: pm.environment.set("taxAdminUserName", pm.variables.replaceIn("taxAdmin-rlm-{{$timestamp}}@revoman.org"));
    language: text/javascript
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json()
      pm.environment.set("taxAdminUserId", jsonData.graphs[0].graphResponse.compositeResponse[0].body.id);
    language: text/javascript
order: 5000

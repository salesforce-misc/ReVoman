$kind: http-request
url: "{{baseUrl}}{{versionPath}}/query/?q=SELECT Id FROM PermissionSet WHERE Name IN ({{salesRepPermSets}})"
method: GET
headers:
  Content-Type: application/json
queryParams:
  q: SELECT Id FROM PermissionSet WHERE Name IN ({{salesRepPermSets}})
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      jsonData.records.forEach((record, index) => {
          pm.environment.set("salesRepPS" + (index + 1) + "Id", record.Id)
      })
    language: text/javascript
  - type: beforeRequest
    code: pm.environment.set("salesRepPermSets", "'RevLifecycleManagementQuotePricesTaxes', 'ProductDiscoveryUser', 'ProductCatalogManagementViewer', 'ContextServiceRuntimePsl', 'Custom_Sales_Rep_Perm_Set'")
    language: text/javascript
order: 8000

$kind: http-request
url: "{{baseUrl}}{{versionPath}}/composite/graph"
method: POST
body:
  type: json
  content: |-
    {
      "graphs": [
        {
          "graphId": "1",
          "compositeRequest": [
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/User",
              "referenceId": "refUser",
              "body": {
                "Username": "{{salesRepUserName}}",
                "ProfileId": "{{standardUserProfileId}}",
                "Alias": "salesRep",
                "Email": "{{salesRepUserName}}",
                "EmailEncodingKey": "ISO-8859-1",
                "LastName": "Salaar",
                "LanguageLocaleKey": "en_US",
                "LocaleSidKey": "en_US",
                "TimeZoneSidKey": "America/Los_Angeles"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/PermissionSetAssignment/",
              "referenceId": "salesRepPS1Assignment",
              "body": {
                "AssigneeId": "@{refUser.id}",
                "PermissionSetId": "{{salesRepPS1Id}}"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/PermissionSetAssignment/",
              "referenceId": "salesRepPS2Assignment",
              "body": {
                "AssigneeId": "@{refUser.id}",
                "PermissionSetId": "{{salesRepPS2Id}}"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/PermissionSetAssignment/",
              "referenceId": "salesRepPS3Assignment",
              "body": {
                "AssigneeId": "@{refUser.id}",
                "PermissionSetId": "{{salesRepPS3Id}}"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/PermissionSetAssignment/",
              "referenceId": "salesRepPS4Assignment",
              "body": {
                "AssigneeId": "@{refUser.id}",
                "PermissionSetId": "{{salesRepPS4Id}}"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/PermissionSetAssignment/",
              "referenceId": "salesRepPS5Assignment",
              "body": {
                "AssigneeId": "@{refUser.id}",
                "PermissionSetId": "{{salesRepPS5Id}}"
              }
            }
          ]
        }
      ]
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: beforeRequest
    code: pm.environment.set("salesRepUserName", pm.variables.replaceIn("salesRep-rlm-{{$timestamp}}@revoman.org"));
    language: text/javascript
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json()
      pm.environment.set("salesRepUserId", jsonData.graphs[0].graphResponse.compositeResponse[0].body.id);
    language: text/javascript
order: 9000

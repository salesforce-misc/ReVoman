              "body": { "Name": "Skills Territory {{$timestamp}}", "OperatingHoursId": "@{refTerritoryOh.id}", "IsActive": true }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/WorkType",

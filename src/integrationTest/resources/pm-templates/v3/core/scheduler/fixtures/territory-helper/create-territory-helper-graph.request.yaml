              "url": "{{versionPath}}/sobjects/ServiceResource",
              "referenceId": "refResourceB",
              "body": { "Name": "Territory Resource B {{$timestamp}}", "RelatedRecordId": "@{refUserB.id}", "ResourceType": "T", "IsActive": true, "IsPrimary": true }
            },

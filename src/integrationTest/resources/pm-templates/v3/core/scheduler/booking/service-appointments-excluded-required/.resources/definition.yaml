$kind: collection
description: |-
  OLD Scheduler book of the excluded-helper fixture with resourceB (the account-Excluded resource) sent as
  the SINGLE required+primary assignedResource. The classic book path passes accountResourcePreferences=null
  (getAppointmentSlotsForTerritoryWorkTypes never loads them), so the account Excluded list is never
  enforced on write and the SA is expected to BOOK despite the exclusion — the divergence from Unified,
  which rejects the same required-excluded write. Captures oldReqExcludedWriteHttp + oldReqExcludedWriteSaId.
  Runs under {{adminToken}}.
auth:
  - id: 7e1f0c00-1005-4aaa-9bbb-000000000043
    type: bearer
    name: bearer auth
    credentials:
      token: "{{adminToken}}"

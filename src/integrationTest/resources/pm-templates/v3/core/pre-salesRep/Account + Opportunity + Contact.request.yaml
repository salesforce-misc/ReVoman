$kind: http-request
url: "{{baseUrl}}{{versionPath}}/composite/graph"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "graphs": [
        {
          "graphId": "1",
          "compositeRequest": [
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/Account",
              "referenceId": "account",
              "body": {
                "Name": "{{$randomFirstName}} Account",
                "BillingPostalCode": "94003",
                "BillingCity": "San Mateo",
                "BillingState": "CA",
                "BillingStreet": "856 Homewood Ave.",
                "BillingCountry": "United States",
                "ShippingStreet": "856 Homewood Ave.",
                "ShippingPostalCode": "94003",
                "ShippingCountry": "United States",
                "ShippingState": "CA",
                "ShippingCity": "San Mateo"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/Contact",
              "referenceId": "contact",
              "body": {
                "AccountId": "@{account.id}",
                "FirstName": "{{$randomFirstName}}",
                "LastName": "{{$randomLastName}}",
                "Email": "{{$randomEmail}}"
              }
            },
            {
              "method": "POST",
              "url": "{{versionPath}}/sobjects/Opportunity",
              "referenceId": "opportunity",
              "body": {
                "Name": "Opportunity_{{$randomCompanyName}}",
                "AccountId": "@{account.id}",
                "StageName": "Prospecting",
                "Pricebook2Id": "{{standardPricebookId}}",
                "CloseDate": "{{$randomFutureDate}}"
              }
            }
          ]
        }
      ]
    }
scripts:
  - type: afterResponse
    code: |
      var graphData = JSON.parse(responseBody).graphs[0];

      if (graphData.isSuccessful) {
        graphData.graphResponse.compositeResponse.forEach(response => 
          pm.environment.set(response.referenceId + "Id", response.body.id))
      }
    language: text/javascript
  - type: beforeRequest
    code: |-
      var moment = require('moment');
      var futureDateTime = moment().add(364, 'days');
      pm.environment.set('$randomFutureDate', futureDateTime.format('YYYY-MM-DD'));
    language: text/javascript
order: 2000
